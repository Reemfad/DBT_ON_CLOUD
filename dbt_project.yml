name: 'DBT_ON_CLOUD'
version: '1.0.0'
config-version: 2

# My used profile
profile: 'default'

flags:
  use_managed_iceberg: true
  use_materialization_v2: true

model-paths: ["models"]
# analysis-paths: ["analyses"]
# test-paths: ["tests"]
# seed-paths: ["seeds"]
# macro-paths: ["macros"]
# snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  DBT_ON_CLOUD:        
    silver:
      +schema: silver
      +materialized: table       
    gold:
      +schema: gold
      +materialized: table